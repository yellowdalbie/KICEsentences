<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 — KICE Lynx</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #030712;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1rem;
    }
    .card {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .icon-wrap {
      width: 48px; height: 48px;
      background: rgba(6,182,212,0.12);
      border: 1px solid rgba(6,182,212,0.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    h2 {
      color: #f1f5f9;
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      color: #64748b;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 1.8rem;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.92rem;
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1rem;
    }
    input[type="password"]:focus {
      border-color: rgba(6,182,212,0.5);
      box-shadow: 0 0 0 3px rgba(6,182,212,0.08);
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: #030712;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(6,182,212,0.3);
      transition: all 0.2s;
      margin-top: 0.3rem;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(6,182,212,0.45); }
    .msg {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }
    .msg.success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: #10b981; }
    .done { display: none; text-align: center; padding: 1rem 0; }
    .done p { color: #10b981; margin-bottom: 1.2rem; font-size: 0.95rem; }
    .done a { color: #06b6d4; text-decoration: none; font-size: 0.9rem; }
    .done a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2>비밀번호 재설정</h2>
    <p class="subtitle" id="subtitle">새 비밀번호를 입력해주세요.</p>

    <div class="msg error" id="msg-error"></div>

    <div id="form-wrap">
      <label>새 비밀번호</label>
      <input type="password" id="pw" placeholder="6자리 이상">
      <label>새 비밀번호 확인</label>
      <input type="password" id="pw2" placeholder="비밀번호 다시 입력"
             onkeyup="if(event.key==='Enter') submitReset()">
      <button class="btn" onclick="submitReset()">비밀번호 변경</button>
    </div>

    <div class="done" id="done-wrap">
      <p>✓ 비밀번호가 변경되었습니다.</p>
      <a href="/">← 메인으로 돌아가기</a>
    </div>
  </div>

  <script>
    const TOKEN = '{{ token }}';

    if (!TOKEN) {
      document.getElementById('subtitle').textContent = '유효하지 않은 링크입니다.';
      document.getElementById('form-wrap').style.display = 'none';
    }

    async function submitReset() {
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      const errEl = document.getElementById('msg-error');
      errEl.style.display = 'none';

      if (!pw || pw.length < 6) {
        errEl.textContent = '비밀번호는 6자리 이상이어야 합니다.';
        errEl.style.display = 'block';
        return;
      }
      if (pw !== pw2) {
        errEl.textContent = '비밀번호가 일치하지 않습니다.';
        errEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/reset_password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: TOKEN, new_password: pw })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || '오류가 발생했습니다.';
          errEl.style.display = 'block';
        } else {
          document.getElementById('form-wrap').style.display = 'none';
          document.getElementById('subtitle').style.display = 'none';
          document.getElementById('done-wrap').style.display = 'block';
        }
      } catch(e) {
        errEl.textContent = '서버 통신 실패';
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
