<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KICE LYNX Admin</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101010;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .msg {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: #a3a3a3;
    }

    .btn {
      padding: 0.8rem 1.5rem;
      background: transparent;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: rgba(56, 189, 248, 0.1);
    }
  </style>
</head>

<body>
  <div class="msg">제보 관리 기능이 폐기되었습니다. (KICE LYNX V2 디자인 개편)</div>
  <a href="/" class="btn">대시보드로 돌아가기</a>
</body>

</html>
