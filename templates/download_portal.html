<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KICE Lynx 다운로드</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #070b14;
  color: #f8fafc;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-top-color: rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 2.5rem 3rem;
  max-width: 520px;
  width: 100%;
}
h1 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
  color: #f8fafc;
}
.version {
  font-size: 0.82rem;
  color: #06b6d4;
  font-weight: 600;
  margin-bottom: 2rem;
  letter-spacing: 0.05em;
}
.dl-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.dl-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 0.9rem 1.2rem;
  gap: 1rem;
}
.dl-label {
  font-size: 0.95rem;
  font-weight: 600;
  color: #e2e8f0;
}
.dl-size {
  font-size: 0.78rem;
  color: #64748b;
  margin-top: 0.2rem;
}
.dl-btn {
  display: inline-block;
  padding: 0.45rem 1.1rem;
  background: #06b6d4;
  color: #070b14;
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 700;
  text-decoration: none;
  white-space: nowrap;
  transition: opacity 0.18s;
  flex-shrink: 0;
}
.dl-btn:hover { opacity: 0.82; }
.note {
  margin-top: 1.8rem;
  font-size: 0.78rem;
  color: #475569;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="card">
  <h1>KICE Lynx 다운로드</h1>
  <div class="version">{{ version }}</div>
  <div class="dl-list">
    <div class="dl-item">
      <div>
        <div class="dl-label">macOS (Apple Silicon)</div>
        <div class="dl-size">{{ sizes['mac-arm64'] }}</div>
      </div>
      <a class="dl-btn" href="{{ urls['mac-arm64'] }}">다운로드</a>
    </div>
    <div class="dl-item">
      <div>
        <div class="dl-label">macOS (Intel)</div>
        <div class="dl-size">{{ sizes['mac-x86'] }}</div>
      </div>
      <a class="dl-btn" href="{{ urls['mac-x86'] }}">다운로드</a>
    </div>
    <div class="dl-item">
      <div>
        <div class="dl-label">Windows</div>
        <div class="dl-size">{{ sizes['windows'] }}</div>
      </div>
      <a class="dl-btn" href="{{ urls['windows'] }}">다운로드</a>
    </div>
  </div>
  <p class="note">GitHub Releases에서 직접 파일을 내려받습니다.<br>파일명: KICE_Lynx_{{ version }}_[플랫폼].zip</p>
</div>
</body>
</html>
