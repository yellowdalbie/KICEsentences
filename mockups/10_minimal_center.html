<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Mockup 10: Centered Minimal</title>
    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
        }

        @font-face {
            font-family: 'Paperozi-Bold';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Paperozi', serif;
            background: #FFFFFF;
            color: #111;
            display: flex;
            justify-content: center;
            overflow-y: scroll;
        }

        .container {
            width: 100%;
            max-width: 760px;
            padding: 4rem 2rem 8rem 2rem;
            box-sizing: border-box;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .breadcrumb span {
            color: #111;
            font-family: 'Paperozi-Bold';
            cursor: pointer;
        }

        .huge-search {
            width: 100%;
            border: none;
            border-bottom: 2px solid #111;
            padding: 1rem 0;
            font-size: 2.5rem;
            font-family: 'Paperozi-Bold';
            outline: none;
            margin-bottom: 4rem;
            color: #111;
        }

        .huge-search::placeholder {
            color: #DDD;
        }

        .article-block {
            margin-bottom: 4rem;
            position: relative;
        }

        .article-block::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #EEE;
            transition: 0.3s;
        }

        .article-block:hover::before {
            background: #333;
        }

        h2.prob-id {
            font-size: 1.8rem;
            margin: 0 0 1rem 0;
            font-family: 'Paperozi-Bold';
        }

        .standard-quote {
            font-style: italic;
            color: #555;
            padding: 1rem 1.5rem;
            background: #F9F9F9;
            border-left: 4px solid #CCC;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.6;
        }

        .reading-step {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: baseline;
        }

        .reading-num {
            font-family: 'Paperozi-Bold';
            font-size: 1.2rem;
            color: #CCC;
            min-width: 30px;
        }

        .reading-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #222;
        }

        hr.divider {
            border: 0;
            height: 1px;
            background: #EEE;
            margin: 4rem 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="breadcrumb">KICE Database / Math Common / <span>1. Polynomials</span></div>

        <input type="text" class="huge-search" placeholder="Type to search..." value="">
        <div style="font-size: 0.9rem; color: #888; margin-top: -3rem; margin-bottom: 4rem; text-align: right;">142
            Documents found</div>

        <!-- Document 1 -->
        <div class="article-block">
            <h2 class="prob-id">2026.9모_공22</h2>
            <div class="standard-quote">
                "[9수01-04] 다항식의 덧셈, 뺄셈, 곱셈과 나눗셈을 할 수 있다."
            </div>

            <div class="reading-step">
                <div class="reading-num">01</div>
                <div class="reading-text">다항식 P(x)를 x-a로 나눈 나머지가 P(a)임을 이용하여 식을 세운다.</div>
            </div>
            <div class="reading-step">
                <div class="reading-num">02</div>
                <div class="reading-text">주어진 두 조건식을 연립하여 일차방정식의 해를 구한다.</div>
            </div>
        </div>

        <hr class="divider">

        <!-- Document 2 -->
        <div class="article-block">
            <h2 class="prob-id">2025.수능_공14</h2>
            <div class="standard-quote">
                "[10수01-05] 인수분해 공식을 이용하여 다항식을 인수분해할 수 있다."
            </div>

            <div class="reading-step">
                <div class="reading-num">01</div>
                <div class="reading-text">다항식의 인수분해를 위해 조립제법을 사용하여 근을 찾는다.</div>
            </div>
        </div>
    </div>
</body>

</html>
